name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.6-bookworm
        env:
          POSTGRES_USER: niet_erp
          POSTGRES_PASSWORD: ci-only-password
          POSTGRES_DB: niet_erp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U niet_erp -d niet_erp_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      opensearch:
        image: opensearchproject/opensearch:3.7.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports: ["9200:9200"]
    env:
      DATABASE_URL: postgresql://niet_erp:ci-only-password@127.0.0.1:5432/niet_erp_test
      OPENSEARCH_NODE: http://127.0.0.1:9200
      OPENSEARCH_USERNAME: ci-verifier
      OPENSEARCH_PASSWORD: ci-verification-password
      OPENSEARCH_INDEX: niet-erp-ci-verification
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run oidc:verify
      - run: npm run db:migrate
      - name: Verify generated OpenAPI contract
        env:
          OIDC_ISSUER: http://127.0.0.1:8080/realms/niet
          OIDC_AUDIENCE: niet-erp-api
          OIDC_JWKS_URI: http://127.0.0.1:8080/realms/niet/protocol/openid-connect/certs
          OBJECT_STORAGE_ENDPOINT: http://127.0.0.1:9000
          OBJECT_STORAGE_ACCESS_KEY: ci-storage
          OBJECT_STORAGE_SECRET_KEY: ci-storage-verification-secret
          OBJECT_STORAGE_QUARANTINE_BUCKET: niet-erp-quarantine
          OBJECT_STORAGE_CLEAN_BUCKET: niet-erp-documents
        run: npm run contract:verify
      - run: npm run db:verify
      - run: npm run students:verify
      - run: npm run curriculum:verify
      - run: npm run registration:verify
      - run: npm run registration-windows:verify
      - run: npm run registration-eligibility:verify
      - run: npm run attendance:verify
      - run: npm run finance:verify
      - run: npm run fee-structures:verify
      - run: npm run migration:verify
      - run: npm run admissions:verify
      - run: npm run admission-offers:verify
      - run: npm run seat-matrices:verify
      - run: npm run merit-lists:verify
      - run: npm run conversion-exceptions:verify
      - run: npm run admission-cancellations:verify
      - run: npm run timetable:verify
      - run: npm run student-core:verify
      - run: npm run programmes:verify
      - run: npm run holds:verify
      - run: npm run student-withdrawals:verify
      - run: npm run access:verify
      - run: npm run workflow:verify
      - run: npm run documents:verify
      - run: npm run notifications:verify
      - name: Wait for OpenSearch
        run: for attempt in {1..60}; do curl --max-time 2 --fail --silent http://127.0.0.1:9200 >/dev/null && exit 0; sleep 2; done; exit 1
      - run: npm run search:verify
      - run: npm run platform-slice:verify
      - name: Install matching PostgreSQL 17 client
        run: |
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          sudo curl --fail --silent --show-error --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      - run: npm run restore:verify
      - name: Verify database and API failure behavior
        env:
          FAILURE_DRILL_CONFIRM: DISPOSABLE_TEST_SERVICES
          NODE_ENV: production
          HOST: 127.0.0.1
          PORT: 3001
          OIDC_ISSUER: http://127.0.0.1:8080/realms/niet
          OIDC_AUDIENCE: niet-erp-api
          OIDC_JWKS_URI: http://127.0.0.1:8080/realms/niet/protocol/openid-connect/certs
          OBJECT_STORAGE_ENDPOINT: http://127.0.0.1:9000
          OBJECT_STORAGE_ACCESS_KEY: ci-storage
          OBJECT_STORAGE_SECRET_KEY: ci-storage-verification-secret
          OBJECT_STORAGE_QUARANTINE_BUCKET: niet-erp-quarantine
          OBJECT_STORAGE_CLEAN_BUCKET: niet-erp-documents
        run: |
          POSTGRES_CONTAINER_ID="$(docker ps --filter ancestor=postgres:17.6-bookworm --format '{{.ID}}')"
          test -n "$POSTGRES_CONTAINER_ID"
          export POSTGRES_CONTAINER_ID
          npm run failure:verify
      - run: npm audit --audit-level=moderate

  container-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build deployment images
        run: |
          for target in api web worker migrate; do
            docker build --file infrastructure/container/Containerfile --target "$target" --tag "niet-erp-$target:ci" .
          done

  mobile-android-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: npm ci
      - name: Build Student Android debug application
        working-directory: apps/student-mobile/android
        run: ./gradlew assembleDebug --no-daemon
      - name: Build Staff Android debug application
        working-directory: apps/staff-mobile/android
        run: ./gradlew assembleDebug --no-daemon
