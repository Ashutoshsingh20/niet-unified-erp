name: niet-erp

services:
  postgres:
    image: ${POSTGRES_IMAGE:?Set POSTGRES_IMAGE to an approved registry image}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-niet_erp}
      POSTGRES_USER: ${POSTGRES_USER:-niet_erp}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [data]
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:?Set REDIS_IMAGE to an approved registry image}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "$${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    entrypoint:
      - /bin/sh
      - -ec
      - export REDIS_PASSWORD="$$(cat /run/secrets/redis_password)"; exec docker-entrypoint.sh "$@"
      - --
    secrets: [redis_password]
    volumes:
      - redis_data:/data
    networks: [data]
    restart: unless-stopped

  rabbitmq:
    image: ${RABBITMQ_IMAGE:?Set RABBITMQ_IMAGE to an approved registry image}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-niet_erp}
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
    secrets: [rabbitmq_password]
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [data, management]
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:?Set MINIO_IMAGE to an approved registry image}
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-niet_erp_minio}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
    secrets: [minio_password]
    volumes:
      - minio_data:/data
    networks: [data, management]
    restart: unless-stopped

  keycloak:
    image: ${KEYCLOAK_IMAGE:?Set KEYCLOAK_IMAGE to an approved registry image}
    command: ["start", "--optimized", "--http-enabled=true", "--hostname-strict=false"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-niet_erp}
      KC_DB_USERNAME: ${POSTGRES_USER:-niet_erp}
      KC_DB_PASSWORD_FILE: /run/secrets/postgres_password
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-bootstrap-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    secrets: [postgres_password, keycloak_admin_password]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [application, data]
    restart: unless-stopped

  opensearch:
    profiles: [search]
    image: ${OPENSEARCH_IMAGE:?Set OPENSEARCH_IMAGE to an approved registry image}
    environment:
      discovery.type: single-node
      plugins.security.disabled: "false"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD_FILE: /run/secrets/opensearch_admin_password
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
    secrets: [opensearch_admin_password]
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks: [data]
    restart: unless-stopped

  prometheus:
    profiles: [observability]
    image: ${PROMETHEUS_IMAGE:?Set PROMETHEUS_IMAGE to an approved registry image}
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [management, application]
    restart: unless-stopped

networks:
  application:
    internal: true
  data:
    internal: true
  management:
    internal: true

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:
  prometheus_data:

secrets:
  postgres_password:
    file: ${SECRETS_DIRECTORY:?Set SECRETS_DIRECTORY}/postgres_password
  redis_password:
    file: ${SECRETS_DIRECTORY:?Set SECRETS_DIRECTORY}/redis_password
  rabbitmq_password:
    file: ${SECRETS_DIRECTORY:?Set SECRETS_DIRECTORY}/rabbitmq_password
  minio_password:
    file: ${SECRETS_DIRECTORY:?Set SECRETS_DIRECTORY}/minio_password
  keycloak_admin_password:
    file: ${SECRETS_DIRECTORY:?Set SECRETS_DIRECTORY}/keycloak_admin_password
  opensearch_admin_password:
    file: ${SECRETS_DIRECTORY:?Set SECRETS_DIRECTORY}/opensearch_admin_password

