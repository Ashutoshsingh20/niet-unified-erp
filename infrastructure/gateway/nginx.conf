events {}

http {
  server_tokens off;
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

  upstream web { server web:3000; keepalive 32; }
  upstream keycloak { server keycloak:8080; keepalive 16; }

  server {
    listen 8443 ssl http2;
    server_name _;
    ssl_certificate /run/secrets/tls_certificate;
    ssl_certificate_key /run/secrets/tls_private_key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;
    client_max_body_size 2m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;

    location ^~ /identity/admin/ {
      return 404;
    }

    location /identity/ {
      limit_req zone=login burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://keycloak;
    }

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://web;
    }
  }
}
